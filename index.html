<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trip Schedule Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root, body[data-theme="rail-indigo"]{
    --ink:#101826; --ink-2:#182338;
    --paper:#eee6d3; --paper-2:#e4dabf; --paper-text:#241f14;
    --vermillion:#c23b22; --gold:#d9a441;
    --cream-text:#f4efe3; --muted:#8b93a6; --slate:#7a8399;
    --input-bg:#fbf6e9; --input-border:#cabb98;
  }
  body[data-theme="sakura"]{
    --ink:#2b1f28; --ink-2:#3a2a35;
    --paper:#fbeef0; --paper-2:#f3dbe0; --paper-text:#3a2530;
    --vermillion:#c9587c; --gold:#e0a8b8;
    --cream-text:#fdf3f5; --muted:#b18d97; --slate:#c79aa6;
    --input-bg:#fff8f9; --input-border:#e6c3ce;
  }
  body[data-theme="neon-night"]{
    --ink:#05070d; --ink-2:#0d1220;
    --paper:#151b2e; --paper-2:#1c2440; --paper-text:#eaf6ff;
    --vermillion:#ff2e63; --gold:#08d9d6;
    --cream-text:#eaf6ff; --muted:#6b7aa1; --slate:#4d5b82;
    --input-bg:#1c2440; --input-border:#334166;
  }
  body[data-theme="paper-lantern"]{
    --ink:#2a1810; --ink-2:#3d2417;
    --paper:#f7ecd9; --paper-2:#eeddbc; --paper-text:#2a1810;
    --vermillion:#b23a2e; --gold:#c98a3c;
    --cream-text:#f7ecd9; --muted:#a88a6a; --slate:#8a6f52;
    --input-bg:#fffaf0; --input-border:#d9c39a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--cream-text);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:860px;margin:0 auto;padding:28px 20px 80px;}

  /* ---- Header ---- */
  .header{margin-bottom:20px;}
  .top-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;}
  .eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--gold); margin:0 0 6px;
  }
  h1{
    font-family:'Big Shoulders Display',sans-serif; font-weight:800; font-size:44px;
    line-height:0.95; letter-spacing:0.01em; text-transform:uppercase;
    margin:0 0 4px; color:var(--cream-text);
  }

  /* ---- Theme picker ---- */
  .theme-picker{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
  .theme-picker-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--muted);}
  .theme-swatches{display:flex;gap:8px;}
  .swatch{
    width:24px;height:24px;border-radius:50%;cursor:pointer;
    border:2px solid transparent; padding:0;
  }
  .swatch.active{border-color:var(--cream-text);}

  /* ---- Section tabs ---- */
  .section-tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:18px 0 6px;}
  .section-tab{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.03em;text-transform:uppercase;
    padding:8px 14px;border-radius:20px;border:1px solid var(--slate);background:none;color:var(--muted);
    cursor:pointer;
  }
  .section-tab.active{background:var(--vermillion);border-color:var(--vermillion);color:#fff;}
  .section-tab-add{
    font-family:'IBM Plex Mono',monospace;font-size:12px;
    padding:8px 14px;border-radius:20px;border:1px dashed var(--slate);background:none;color:var(--muted);cursor:pointer;
  }
  .section-tab-add:hover{border-color:var(--vermillion);color:var(--cream-text);}

  /* ---- Line map ---- */
  .linemap{position:relative;display:flex;align-items:center;gap:0;padding:18px 6px 26px;overflow-x:auto;}
  .linemap-track{position:absolute;left:28px;right:28px;top:34px;height:3px;background:var(--vermillion);opacity:0.55;}
  .station{
    position:relative;display:flex;flex-direction:column;align-items:center;gap:8px;
    min-width:88px;cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;padding:0;z-index:1;
  }
  .station .dot{width:16px;height:16px;border-radius:50%;background:var(--ink);border:3px solid var(--vermillion);transition:all .15s ease;}
  .station.active .dot{background:var(--vermillion);box-shadow:0 0 0 4px rgba(194,59,34,0.25);}
  .station .st-label{
    font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:0.03em;text-align:center;
    color:var(--muted);max-width:100px;line-height:1.3;
  }
  .station.active .st-label{color:var(--cream-text);}
  .add-day-btn{
    display:flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:50%;
    border:3px dashed var(--slate);background:none;color:var(--slate);cursor:pointer;
  }
  .add-day-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;min-width:70px;z-index:1;}
  .add-day-wrap span{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--slate);}

  /* ---- Day panel ---- */
  .day-panel{background:var(--ink-2);border:1px solid #33415e33;border-radius:4px;padding:22px 22px 26px;}
  .day-title-row{
    display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:22px;
    border-bottom:1px dashed var(--slate);padding-bottom:16px;
  }
  .day-title-input{
    font-family:'Big Shoulders Display',sans-serif;font-weight:700;font-size:26px;text-transform:uppercase;
    letter-spacing:0.01em;color:var(--cream-text);background:none;border:none;border-bottom:1px solid transparent;
    padding:2px 0;width:100%;max-width:520px;
  }
  .day-title-input:focus{outline:none;border-bottom:1px solid var(--vermillion);}
  .day-actions{display:flex;gap:10px;flex-shrink:0;padding-top:4px;}
  .icon-btn{
    background:none;border:1px solid var(--slate);color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;
    padding:6px 10px;border-radius:3px;cursor:pointer;letter-spacing:0.03em;text-transform:uppercase;
  }
  .icon-btn:hover{border-color:var(--vermillion);color:var(--cream-text);}

  /* ---- Ticket stub entries ---- */
  .entries{display:flex;flex-direction:column;gap:0;}
  .empty-state{
    font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--muted);padding:30px 10px;text-align:center;
    border:1px dashed var(--slate);border-radius:4px;
  }
  .stub{position:relative;display:flex;background:var(--paper);border-radius:3px;overflow:hidden;color:var(--paper-text);margin-bottom:0;}
  .stub-time{
    font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:20px;color:var(--paper-text);background:var(--paper-2);
    padding:16px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:92px;
    border-right:2px dashed var(--paper-text);position:relative;
  }
  .stub-time small{font-size:10px;font-weight:500;letter-spacing:0.05em;opacity:0.65;margin-top:2px;}
  .stub-time::before,.stub-time::after{content:"";position:absolute;right:-9px;width:18px;height:18px;background:var(--ink-2);border-radius:50%;}
  .stub-time::before{top:-9px;} .stub-time::after{bottom:-9px;}
  .stub-body{flex:1;padding:14px 16px;min-width:0;}
  .stub-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
  .tag{
    font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;
    padding:2px 8px;border-radius:20px;color:#fff;white-space:nowrap;
  }
  .stub-title{font-family:'Inter',sans-serif;font-weight:600;font-size:16px;color:var(--paper-text);margin:2px 0 2px;}
  .stub-notes{font-size:13px;color:var(--paper-text);opacity:0.75;line-height:1.4;margin:0 0 4px;}
  .stub-location{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--paper-text);opacity:0.55;margin:0;}
  .stub-actions{display:flex;flex-direction:column;gap:6px;padding:12px 10px;border-left:1px solid var(--paper-2);}
  .stub-actions button{
    background:none;border:none;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.03em;
    text-transform:uppercase;color:var(--paper-text);opacity:0.6;padding:4px 6px;border-radius:3px;
  }
  .stub-actions button:hover{opacity:1;background:var(--paper-2);}

  /* ---- Directions connector ---- */
  .connector{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:8px 10px 8px 30px;margin:2px 0;
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);
  }
  .connector.muted{opacity:0.5;font-style:italic;}
  .connector-links{display:flex;gap:6px;flex-wrap:wrap;}
  .connector-links a{
    color:var(--gold);text-decoration:none;border:1px solid var(--slate);border-radius:20px;
    padding:3px 10px;letter-spacing:0.02em;
  }
  .connector-links a:hover{border-color:var(--gold);background:rgba(217,164,65,0.1);}

  /* ---- Add / edit form ---- */
  .entry-form{background:var(--paper);border-radius:3px;padding:16px;color:var(--paper-text);display:flex;flex-direction:column;gap:10px;margin-bottom:10px;}
  .form-row{display:flex;gap:10px;flex-wrap:wrap;}
  .form-row > div{display:flex;flex-direction:column;gap:4px;}
  label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.05em;text-transform:uppercase;color:var(--paper-text);opacity:0.6;}
  input[type=time],input[type=text],select,textarea{
    font-family:'Inter',sans-serif;font-size:14px;padding:8px 10px;border-radius:3px;
    border:1px solid var(--input-border);background:var(--input-bg);color:var(--paper-text);
  }
  input[type=text]{flex:1;min-width:180px;}
  textarea{width:100%;resize:vertical;min-height:44px;font-family:'Inter',sans-serif;}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:2px;}
  .btn{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:0.04em;text-transform:uppercase;padding:9px 16px;border-radius:3px;border:none;cursor:pointer;}
  .btn-primary{background:var(--vermillion);color:#fff;}
  .btn-primary:hover{opacity:0.88;}
  .btn-ghost{background:none;border:1px solid var(--input-border);color:var(--paper-text);opacity:0.75;}
  .btn-ghost:hover{opacity:1;}

  .add-stop-btn{
    margin-top:10px;width:100%;background:none;border:1px dashed var(--slate);color:var(--muted);
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:0.05em;text-transform:uppercase;padding:12px;border-radius:4px;cursor:pointer;
  }
  .add-stop-btn:hover{border-color:var(--vermillion);color:var(--cream-text);}

  .footer-note{text-align:center;margin-top:24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
  .footer-note button{background:none;border:none;color:var(--muted);text-decoration:underline;cursor:pointer;font-family:inherit;font-size:inherit;}
  .loading{padding:60px 0;text-align:center;font-family:'IBM Plex Mono',monospace;color:var(--muted);}

  @media (max-width:560px){
    h1{font-size:32px;}
    .top-row{flex-direction:column;}
    .theme-picker{align-items:flex-start;}
    .stub{flex-direction:column;}
    .stub-time{flex-direction:row;gap:8px;min-width:0;border-right:none;border-bottom:2px dashed var(--paper-text);}
    .stub-time::before,.stub-time::after{display:none;}
    .stub-actions{flex-direction:row;border-left:none;border-top:1px solid var(--paper-2);}
    .connector{padding-left:10px;}
  }
</style>
</head>
<body data-theme="rail-indigo">
<div class="wrap" id="app">
  <div class="loading">Loading your plan…</div>
</div>

<script>
const SHARED_KEY = "trip-planner-sections-v2";
const LOCAL_KEY  = "trip-planner-local-prefs-v2";

const CATEGORIES = {
  culture:     { label: "Culture",     color: "#3a5a8c" },
  food:        { label: "Food",        color: "#c23b22" },
  shopping:    { label: "Shopping",    color: "#d9a441" },
  arcade:      { label: "Arcade/Fun",  color: "#2f8577" },
  sightseeing: { label: "Sightseeing", color: "#7a8399" },
  other:       { label: "Free Time",   color: "#5c5147" }
};

const THEMES = [
  { id: "rail-indigo",   label: "Rail Indigo",    swatch: "#c23b22" },
  { id: "sakura",        label: "Sakura",         swatch: "#c9587c" },
  { id: "neon-night",    label: "Neon Night",     swatch: "#08d9d6" },
  { id: "paper-lantern", label: "Paper Lantern",  swatch: "#c98a3c" }
];

function uid(){ return Math.random().toString(36).slice(2, 10); }

function defaultSections(){
  return [
    {
      id: "tokyo",
      name: "Tokyo",
      days: [
        {
          id: "d1",
          label: "Old Tokyo: Temples, Towers & Matcha",
          entries: [
            { id: uid(), time: "09:00", title: "Sensō-ji Temple", category: "culture", location: "Senso-ji Temple, Tokyo", notes: "Tokyo's oldest temple, founded 645 AD." },
            { id: uid(), time: "09:45", title: "Asakusa Shrine", category: "culture", location: "Asakusa Shrine, Tokyo", notes: "Right next door to Sensō-ji, calm and uncrowded by comparison. Quick 15-min stop for a totally different vibe than the busy main temple." },
            { id: uid(), time: "11:00", title: "Suzukien Asakusa", category: "food", location: "Suzukien Asakusa, Tokyo", notes: "Famous matcha gelato, 7 intensity levels." },
            { id: uid(), time: "12:30", title: "Tokyo Skytree", category: "sightseeing", location: "Tokyo Skytree", notes: "Tallest tower in Japan, panoramic views." }
          ]
        },
        {
          id: "d2",
          label: "Zoo, Arcades & Night Market",
          entries: [
            { id: uid(), time: "09:00", title: "Ueno Zoo", category: "sightseeing", location: "Ueno Zoo, Tokyo", notes: "Pandas, polar bears, red pandas." },
            { id: uid(), time: "11:00", title: "Kiyomizu Kannon-dō Temple", category: "culture", location: "Kiyomizu Kannon-do Temple, Ueno Park, Tokyo", notes: "One of Tokyo's oldest surviving temple buildings (1632), modeled after Kyoto's famous Kiyomizu-dera. Right inside Ueno Park, with a distinctive circular \"Moon Pine.\"" },
            { id: uid(), time: "11:30", title: "Ueno Toshogu Shrine", category: "culture", location: "Ueno Toshogu Shrine, Tokyo", notes: "Gold-leafed Edo-period shrine, built 1627, a few minutes' walk from Kiyomizu Kannon-dō." },
            { id: uid(), time: "13:00", title: "Akihabara Gamers", category: "arcade", location: "Gamers Akihabara, Tokyo", notes: "7-floor anime/manga superstore." },
            { id: uid(), time: "14:00", title: "Kanda Myojin Shrine", category: "culture", location: "Kanda Myojin Shrine, Tokyo", notes: "Historic shrine in the middle of Akihabara, popular with anime/gaming fans for tech luck blessings." },
            { id: uid(), time: "15:00", title: "TAITO Station Akihabara", category: "arcade", location: "Taito Station Akihabara, Tokyo", notes: "Arcade: claw machines, fighting/rhythm games." },
            { id: uid(), time: "16:30", title: "Don Quijote Akihabara", category: "shopping", location: "Don Quijote Akihabara, Tokyo", notes: "Chaotic discount megastore, open 24 hours." },
            { id: uid(), time: "18:30", title: "Ameyoko Market", category: "food", location: "Ameyoko Market, Tokyo", notes: "Night market, street food." }
          ]
        },
        {
          id: "d3",
          label: "Harajuku & Shibuya",
          entries: [
            { id: uid(), time: "09:00", title: "Meiji Jingu Shrine", category: "culture", location: "Meiji Jingu Shrine, Tokyo", notes: "" },
            { id: uid(), time: "12:00", title: "New Balance Harajuku", category: "shopping", location: "New Balance Harajuku, Tokyo", notes: "" },
            { id: uid(), time: "13:00", title: "Free / Split Period (until 2:30 PM)", category: "other", location: "", notes: "Open block in Harajuku/Cat Street. Good time for the group to split up: some can browse Cat Street's smaller boutiques, others can wander Takeshita-adjacent side streets or just grab lunch at their own pace. No fixed stop — reconvene at THE MATCHA TOKYO." },
            { id: uid(), time: "14:45", title: "THE MATCHA TOKYO Harajuku", category: "food", location: "THE MATCHA TOKYO Harajuku", notes: "" },
            { id: uid(), time: "16:00", title: "Shibuya PARCO", category: "shopping", location: "Shibuya PARCO, Tokyo", notes: "" },
            { id: uid(), time: "18:00", title: "Shibuya Crossing", category: "sightseeing", location: "Shibuya Crossing, Tokyo", notes: "" }
          ]
        }
      ]
    }
  ];
}

function defaultLocalPrefs(){
  return { theme: "rail-indigo", activeSection: "tokyo", activeDayBySection: {} };
}

let sections = null;      // shared across devices
let localPrefs = null;    // per-device only
let editingId = null;
let addingDayId = null;
let editingSectionName = false;

async function loadSections(){
  try{
    const result = await window.storage.get(SHARED_KEY, true);
    if(result && result.value) return JSON.parse(result.value);
  }catch(e){}
  return defaultSections();
}
async function saveSections(){
  try{ await window.storage.set(SHARED_KEY, JSON.stringify(sections), true); }
  catch(e){ console.error("Could not save plan:", e); }
}

async function loadLocalPrefs(){
  try{
    const result = await window.storage.get(LOCAL_KEY, false);
    if(result && result.value) return JSON.parse(result.value);
  }catch(e){}
  return defaultLocalPrefs();
}
async function saveLocalPrefs(){
  try{ await window.storage.set(LOCAL_KEY, JSON.stringify(localPrefs), false); }
  catch(e){ console.error("Could not save preferences:", e); }
}

function fmtTime(t){
  const [h,m] = t.split(":").map(Number);
  const period = h >= 12 ? "PM" : "AM";
  let h12 = h % 12; if(h12 === 0) h12 = 12;
  return { big: String(h12).padStart(2,"0") + ":" + String(m).padStart(2,"0"), period };
}

function getActiveSection(){
  return sections.find(s => s.id === localPrefs.activeSection) || sections[0];
}
function getActiveDay(){
  const sec = getActiveSection();
  const dayId = localPrefs.activeDayBySection[sec.id];
  return sec.days.find(d => d.id === dayId) || sec.days[0];
}

function appleMapsUrl(from, to, mode){
  return "https://maps.apple.com/?saddr=" + encodeURIComponent(from) + "&daddr=" + encodeURIComponent(to) + "&dirflg=" + mode;
}

function render(){
  const app = document.getElementById("app");
  document.body.setAttribute("data-theme", localPrefs.theme);

  const sec = getActiveSection();
  const day = getActiveDay();
  const sortedEntries = [...day.entries].sort((a,b) => a.time.localeCompare(b.time));

  let html = `
    <div class="header">
      <div class="top-row">
        <div>
          <p class="eyebrow">Trip Schedule / 行程表</p>
          <h1>Day Planner</h1>
        </div>
        <div class="theme-picker">
          <span class="theme-picker-label">Theme (this device only)</span>
          <div class="theme-swatches">
            ${THEMES.map(t => `<button class="swatch ${t.id === localPrefs.theme ? 'active' : ''}" style="background:${t.swatch}" data-theme-pick="${t.id}" title="${t.label}"></button>`).join("")}
          </div>
        </div>
      </div>

      <div class="section-tabs">
        ${sections.map(s => `<button class="section-tab ${s.id === sec.id ? 'active' : ''}" data-goto-section="${s.id}">${escapeHtml(s.name)}</button>`).join("")}
        <button class="section-tab-add" id="addSectionBtn">+ Add Trip</button>
      </div>

      <div class="linemap">
        <div class="linemap-track"></div>
        ${sec.days.map((d,i) => `
          <button class="station ${d.id === day.id ? 'active' : ''}" data-goto="${d.id}">
            <span class="dot"></span>
            <span class="st-label">DAY ${i+1}<br>${escapeHtml(truncate(d.label, 22))}</span>
          </button>
        `).join("")}
        <div class="add-day-wrap">
          <button class="add-day-btn" id="addDayBtn" title="Add a day">+</button>
          <span>ADD DAY</span>
        </div>
      </div>
    </div>

    <div class="day-panel">
      <div class="day-title-row">
        <input class="day-title-input" id="dayLabelInput" value="${escapeAttr(day.label)}" />
        <div class="day-actions">
          <button class="icon-btn" id="renameSectionBtn">Rename Trip</button>
          ${sections.length > 1 ? `<button class="icon-btn" id="deleteSectionBtn">Delete Trip</button>` : ""}
          ${sec.days.length > 1 ? `<button class="icon-btn" id="deleteDayBtn">Delete Day</button>` : ""}
        </div>
      </div>

      <div class="entries">
        ${sortedEntries.length === 0 ? `<div class="empty-state">Nothing scheduled yet. Add your first stop below.</div>` : ""}
        ${sortedEntries.map((e,i) => (i > 0 ? renderConnector(sortedEntries[i-1], e) : "") + renderEntry(e)).join("")}
      </div>

      ${addingDayId === day.id ? renderForm(null) : `<button class="add-stop-btn" id="openAddForm">+ Add a stop</button>`}
    </div>

    <p class="footer-note">Trip content syncs for everyone viewing this planner. Theme is local to this device.<br><button id="resetBtn">Clear this trip's stops and start over</button></p>
  `;

  app.innerHTML = html;
  attachEvents();
}

function renderConnector(prev, curr){
  if(!prev.location || !curr.location){
    return `<div class="connector muted">＋ add addresses on both stops above to get travel directions</div>`;
  }
  const w = appleMapsUrl(prev.location, curr.location, "w");
  const r = appleMapsUrl(prev.location, curr.location, "r");
  const d = appleMapsUrl(prev.location, curr.location, "d");
  return `
    <div class="connector">
      <span>travel to next stop:</span>
      <div class="connector-links">
        <a href="${w}" target="_blank" rel="noopener">🚶 Walk</a>
        <a href="${r}" target="_blank" rel="noopener">🚆 Transit</a>
        <a href="${d}" target="_blank" rel="noopener">🚗 Drive</a>
      </div>
    </div>
  `;
}

function renderEntry(e){
  if(editingId === e.id) return renderForm(e);
  const cat = CATEGORIES[e.category] || CATEGORIES.other;
  const t = fmtTime(e.time);
  return `
    <div class="stub">
      <div class="stub-time">${t.big}<small>${t.period}</small></div>
      <div class="stub-body">
        <div class="stub-top"><span class="tag" style="background:${cat.color}">${cat.label}</span></div>
        <p class="stub-title">${escapeHtml(e.title)}</p>
        ${e.notes ? `<p class="stub-notes">${escapeHtml(e.notes)}</p>` : ""}
        ${e.location ? `<p class="stub-location">📍 ${escapeHtml(e.location)}</p>` : ""}
      </div>
      <div class="stub-actions">
        <button data-edit="${e.id}">Edit</button>
        <button data-delete="${e.id}">Delete</button>
      </div>
    </div>
  `;
}

function renderForm(entry){
  const isEdit = !!entry;
  const time = entry ? entry.time : "09:00";
  const title = entry ? entry.title : "";
  const category = entry ? entry.category : "sightseeing";
  const notes = entry ? entry.notes : "";
  const location = entry ? (entry.location || "") : "";
  return `
    <div class="entry-form">
      <div class="form-row">
        <div>
          <label>Time</label>
          <input type="time" id="f_time" value="${time}">
        </div>
        <div style="flex:1">
          <label>What's happening</label>
          <input type="text" id="f_title" placeholder="e.g. Sensō-ji Temple" value="${escapeAttr(title)}">
        </div>
        <div>
          <label>Category</label>
          <select id="f_category">
            ${Object.entries(CATEGORIES).map(([k,v]) => `<option value="${k}" ${k===category?"selected":""}>${v.label}</option>`).join("")}
          </select>
        </div>
      </div>
      <div>
        <label>Address / place name (used for Apple Maps directions)</label>
        <input type="text" id="f_location" placeholder="e.g. Senso-ji Temple, Tokyo" value="${escapeAttr(location)}">
      </div>
      <div>
        <label>Notes (optional)</label>
        <textarea id="f_notes" placeholder="Details, tips, addresses...">${escapeHtml(notes)}</textarea>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="f_cancel">Cancel</button>
        <button class="btn btn-primary" id="f_save" data-id="${isEdit ? entry.id : ''}">${isEdit ? "Save changes" : "Add stop"}</button>
      </div>
    </div>
  `;
}

function truncate(s, n){ return s.length > n ? s.slice(0,n-1) + "…" : s; }
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function attachEvents(){
  document.querySelectorAll("[data-theme-pick]").forEach(btn => {
    btn.addEventListener("click", () => {
      localPrefs.theme = btn.getAttribute("data-theme-pick");
      saveLocalPrefs();
      render();
    });
  });

  document.querySelectorAll("[data-goto-section]").forEach(btn => {
    btn.addEventListener("click", () => {
      localPrefs.activeSection = btn.getAttribute("data-goto-section");
      editingId = null; addingDayId = null;
      saveLocalPrefs();
      render();
    });
  });

  const addSectionBtn = document.getElementById("addSectionBtn");
  if(addSectionBtn){
    addSectionBtn.addEventListener("click", () => {
      const name = prompt("Name this trip (e.g. a city or destination):", "New Trip");
      if(!name) return;
      const newId = uid();
      sections.push({ id: newId, name: name.trim() || "New Trip", days: [{ id: uid(), label: "Day 1", entries: [] }] });
      localPrefs.activeSection = newId;
      saveSections(); saveLocalPrefs();
      render();
    });
  }

  const renameSectionBtn = document.getElementById("renameSectionBtn");
  if(renameSectionBtn){
    renameSectionBtn.addEventListener("click", () => {
      const sec = getActiveSection();
      const name = prompt("Rename this trip:", sec.name);
      if(!name) return;
      sec.name = name.trim() || sec.name;
      saveSections();
      render();
    });
  }

  const deleteSectionBtn = document.getElementById("deleteSectionBtn");
  if(deleteSectionBtn){
    deleteSectionBtn.addEventListener("click", () => {
      if(!confirm("Delete this entire trip and all its days/stops? This affects everyone syncing this planner.")) return;
      const sec = getActiveSection();
      sections = sections.filter(s => s.id !== sec.id);
      localPrefs.activeSection = sections[0].id;
      saveSections(); saveLocalPrefs();
      render();
    });
  }

  document.querySelectorAll("[data-goto]").forEach(btn => {
    btn.addEventListener("click", () => {
      const sec = getActiveSection();
      localPrefs.activeDayBySection[sec.id] = btn.getAttribute("data-goto");
      editingId = null; addingDayId = null;
      saveLocalPrefs();
      render();
    });
  });

  const addDayBtn = document.getElementById("addDayBtn");
  if(addDayBtn){
    addDayBtn.addEventListener("click", () => {
      const sec = getActiveSection();
      const newId = uid();
      sec.days.push({ id: newId, label: "New Day", entries: [] });
      localPrefs.activeDayBySection[sec.id] = newId;
      saveSections(); saveLocalPrefs();
      render();
    });
  }

  const dayLabelInput = document.getElementById("dayLabelInput");
  if(dayLabelInput){
    dayLabelInput.addEventListener("blur", () => {
      const day = getActiveDay();
      day.label = dayLabelInput.value.trim() || "Untitled Day";
      saveSections();
      render();
    });
    dayLabelInput.addEventListener("keydown", (ev) => { if(ev.key === "Enter") dayLabelInput.blur(); });
  }

  const deleteDayBtn = document.getElementById("deleteDayBtn");
  if(deleteDayBtn){
    deleteDayBtn.addEventListener("click", () => {
      if(!confirm("Delete this whole day and its stops?")) return;
      const sec = getActiveSection();
      const day = getActiveDay();
      const idx = sec.days.findIndex(d => d.id === day.id);
      sec.days.splice(idx, 1);
      localPrefs.activeDayBySection[sec.id] = sec.days[Math.max(0, idx-1)].id;
      saveSections(); saveLocalPrefs();
      render();
    });
  }

  const openAddForm = document.getElementById("openAddForm");
  if(openAddForm){
    openAddForm.addEventListener("click", () => {
      addingDayId = getActiveDay().id;
      render();
      const t = document.getElementById("f_title");
      if(t) t.focus();
    });
  }

  document.querySelectorAll("[data-edit]").forEach(btn => {
    btn.addEventListener("click", () => {
      editingId = btn.getAttribute("data-edit");
      addingDayId = null;
      render();
    });
  });

  document.querySelectorAll("[data-delete]").forEach(btn => {
    btn.addEventListener("click", () => {
      if(!confirm("Delete this stop?")) return;
      const day = getActiveDay();
      day.entries = day.entries.filter(e => e.id !== btn.getAttribute("data-delete"));
      saveSections();
      render();
    });
  });

  const cancelBtn = document.getElementById("f_cancel");
  if(cancelBtn){
    cancelBtn.addEventListener("click", () => { editingId = null; addingDayId = null; render(); });
  }

  const saveBtn = document.getElementById("f_save");
  if(saveBtn){
    saveBtn.addEventListener("click", () => {
      const time = document.getElementById("f_time").value || "09:00";
      const title = document.getElementById("f_title").value.trim();
      const category = document.getElementById("f_category").value;
      const location = document.getElementById("f_location").value.trim();
      const notes = document.getElementById("f_notes").value.trim();
      if(!title){ alert("Give this stop a name first."); return; }

      const day = getActiveDay();
      const id = saveBtn.getAttribute("data-id");
      if(id){
        const entry = day.entries.find(e => e.id === id);
        entry.time = time; entry.title = title; entry.category = category; entry.location = location; entry.notes = notes;
      } else {
        day.entries.push({ id: uid(), time, title, category, location, notes });
      }
      editingId = null; addingDayId = null;
      saveSections();
      render();
    });
  }

  const resetBtn = document.getElementById("resetBtn");
  if(resetBtn){
    resetBtn.addEventListener("click", () => {
      if(!confirm("Clear all stops in this trip and start over? Other trips are untouched.")) return;
      const sec = getActiveSection();
      sec.days = [{ id: uid(), label: "Day 1", entries: [] }];
      localPrefs.activeDayBySection[sec.id] = sec.days[0].id;
      saveSections(); saveLocalPrefs();
      render();
    });
  }
}

async function pollForChanges(){
  if(editingId || addingDayId) return;
  try{
    const result = await window.storage.get(SHARED_KEY, true);
    if(result && result.value){
      const incoming = result.value;
      const current = JSON.stringify(sections);
      if(incoming !== current){
        const fresh = JSON.parse(incoming);
        sections = fresh;
        if(!sections.find(s => s.id === localPrefs.activeSection)){
          localPrefs.activeSection = sections[0].id;
        }
        render();
      }
    }
  }catch(e){}
}

(async function init(){
  sections = await loadSections();
  localPrefs = await loadLocalPrefs();
  if(!sections.find(s => s.id === localPrefs.activeSection)){
    localPrefs.activeSection = sections[0].id;
  }
  render();
  setInterval(pollForChanges, 4000);
})();
</script>
</body>
</html>
