<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Trip Schedule Planner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      --bg: #020617;
      --card: #0f172a;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: #1f2937;
      --danger: #f97373;
      --radius: 10px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app {
      max-width: 900px;
      margin: 0 auto;
      padding: 18px 12px 60px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    header h1 {
      font-size: 1.3rem;
      letter-spacing: 0.04em;
    }

    .status-pill {
      font-size: 0.8rem;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15, 23, 42, 0.9);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #f97373;
      box-shadow: 0 0 10px rgba(249, 115, 115, 0.9);
    }

    .card {
      background: linear-gradient(145deg, #020617 0, #0f172a 40%, #020617 100%);
      border-radius: var(--radius);
      border: 1px solid rgba(148, 163, 184, 0.25);
      padding: 12px 12px 14px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    input, textarea {
      width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      padding: 6px 8px;
      font-size: 0.85rem;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
      background: rgba(15, 23, 42, 1);
    }

    label {
      font-size: 0.75rem;
      color: var(--muted);
      display: block;
      margin-bottom: 3px;
    }

    .field-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .field-row > div { flex: 1; }

    button {
      border: none;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      border: 1px solid rgba(148, 163, 184, 0.4);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    button:hover {
      background: rgba(30, 64, 175, 0.7);
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent-soft);
      border-color: var(--accent);
    }

    button.danger {
      background: rgba(127, 29, 29, 0.7);
      border-color: var(--danger);
    }

    .trip-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .trip-item {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .trip-item:hover {
      border-color: rgba(148, 163, 184, 0.5);
      background: rgba(15, 23, 42, 0.9);
    }

    .trip-item.active {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .trip-name { font-size: 0.9rem; }
    .trip-meta { font-size: 0.75rem; color: var(--muted); }

    .day-block {
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
    }

    .day-title {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .entry {
      border-radius: 8px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 6px 8px;
      background: rgba(15, 23, 42, 0.95);
    }

    .entry-title {
      font-size: 0.9rem;
      margin-bottom: 2px;
    }

    .entry-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .entry-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .small {
      font-size: 0.75rem;
      color: var(--muted);
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
    }

    .sync-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .sync-indicator span.dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #f97373;
      box-shadow: 0 0 10px rgba(249, 115, 115, 0.9);
    }

    .sync-indicator.ok span.dot {
      background: #22c55e;
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
    }

    /* Add Stop button */
    .add-stop-button {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 20;
    }

    /* Slide-up panel */
    .panel-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.7);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 30;
    }

    .panel-backdrop.show {
      display: flex;
    }

    .panel {
      width: 100%;
      max-width: 900px;
      background: #020617;
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      padding: 12px 12px 16px;
      box-shadow: 0 -18px 40px rgba(15, 23, 42, 0.8);
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .panel-header-title {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1>Trip Schedule Planner</h1>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span id="status-text">Offline · Local only</span>
    </div>
  </header>

  <!-- Trips -->
  <section class="card">
    <div class="card-title">Trips</div>
    <div class="field-row" style="margin-bottom: 8px;">
      <div>
        <label>New trip name</label>
        <input id="new-trip-name" placeholder="e.g. Japan Trip" />
      </div>
      <div style="flex:0 0 auto; align-self:flex-end;">
        <button class="primary" id="add-trip-btn">Add trip</button>
      </div>
    </div>
    <div class="trip-list" id="trip-list"></div>
  </section>

  <!-- Days & Stops -->
  <section class="card">
    <div class="card-title" id="current-trip-title">No trip selected</div>
    <div id="days-container"></div>
    <div class="footer-row">
      <div class="sync-indicator" id="sync-indicator">
        <span class="dot"></span>
        <span id="sync-text">Local only</span>
      </div>
      <div class="small" id="last-updated-text">Last updated: –</div>
    </div>
  </section>
</div>

<!-- Add Stop button -->
<button class="primary add-stop-button" id="open-panel-btn">Add stop</button>

<!-- Slide-up panel -->
<div class="panel-backdrop" id="panel-backdrop">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-header-title">Add / edit stop</div>
      <button class="danger" id="close-panel-btn">Close</button>
    </div>
    <div class="field-row">
      <div>
        <label>Time</label>
        <input id="entry-time" placeholder="9:00 AM" />
      </div>
      <div>
        <label>Title</label>
        <input id="entry-title" placeholder="Sensō-ji Temple" />
      </div>
    </div>
    <div class="field-row">
      <div>
        <label>Category</label>
        <input id="entry-category" placeholder="Temple / Food / Transit" />
      </div>
      <div>
        <label>Location</label>
        <input id="entry-location" placeholder="Asakusa, Tokyo" />
      </div>
    </div>
    <div style="margin-bottom:8px;">
      <label>Notes</label>
      <textarea id="entry-notes" placeholder="Short notes, reservation info, etc."></textarea>
    </div>
    <div class="field-row">
      <div>
        <label>Day</label>
        <select id="entry-day-select"></select>
      </div>
      <div style="flex:0 0 auto; align-self:flex-end;">
        <button class="primary" id="save-entry-btn">Save stop</button>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB3iogR7d8D-yFNQuuJ1_FjmsvwCrafldI",
    authDomain: "dayplanner-dea19.firebaseapp.com",
    projectId: "dayplanner-dea19",
    storageBucket: "dayplanner-dea19.firebasestorage.app",
    messagingSenderId: "208314336631",
    appId: "1:208314336631:web:a9084375b97594cb860d72",
    measurementId: "G-XJFHPBD0TR"
  };

  let app = null;
  let db = null;
  let analytics = null;
  let firestoreReady = false;
  let saving = false;

  function setStatus(ok, text) {
    const statusText = document.getElementById("status-text");
    const statusDot = document.querySelector(".status-dot");
    const syncText = document.getElementById("sync-text");
    const syncIndicator = document.getElementById("sync-indicator");

    statusText.textContent = text;
    syncText.textContent = ok ? "Synced" : "Local only";
    syncIndicator.classList.toggle("ok", ok);

    statusDot.style.background = ok ? "#22c55e" : "#f97373";
    statusDot.style.boxShadow = ok
      ? "0 0 10px rgba(34, 197, 94, 0.9)"
      : "0 0 10px rgba(249, 115, 115, 0.9)";
  }

  try {
    app = firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    analytics = firebase.analytics();
    firestoreReady = true;
    setStatus(true, "Connected · Cloud sync");
  } catch (e) {
    console.warn("Firebase init failed, staying local-only", e);
    setStatus(false, "Offline · Local only");
  }

  const LOCAL_KEY = "dayplanner_sections";
  const DOC_PATH = { collection: "plans", doc: "dayplanner" };

  const initialSections = {
    trips: [
      {
        id: "japan-trip",
        name: "Japan Trip",
        days: [
          {
            id: "day1-old-tokyo",
            label: "Day 1 — Old Tokyo",
            entries: [
              {
                id: "d1-sensoji",
                time: "9:00 AM",
                title: "Sensō-ji Temple",
                category: "Temple",
                location: "Asakusa",
                notes: "Tokyo's oldest temple, founded 645 AD."
              },
              {
                id: "d1-asakusa-shrine",
                time: "9:45 AM",
                title: "Asakusa Shrine",
                category: "Shrine",
                location: "Asakusa",
                notes: "Calmer shrine next to Sensō-ji."
              },
              {
                id: "d1-skytree",
                time: "12:30 PM",
                title: "Tokyo Skytree",
                category: "Viewpoint",
                location: "Sumida",
                notes: "Panoramic views of Tokyo."
              }
            ]
          },
          {
            id: "day2-zoo-arcades",
            label: "Day 2 — Zoo & Arcades",
            entries: [
              {
                id: "d2-ueno-zoo",
                time: "9:00 AM",
                title: "Ueno Zoo",
                category: "Zoo",
                location: "Ueno",
                notes: "Pandas, polar bears, red pandas."
              },
              {
                id: "d2-akihabara",
                time: "1:00 PM",
                title: "Akihabara Arcades",
                category: "Arcade",
                location: "Akihabara",
                notes: "TAITO Station, claw machines, rhythm games."
              }
            ]
          }
        ]
      }
    ]
  };

  let sections = initialSections;
  let currentTripId = "japan-trip";

  function uid() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  function nowText() {
    return new Date().toLocaleString();
  }

  function renderTrips() {
    const list = document.getElementById("trip-list");
    list.innerHTML = "";

    sections.trips.forEach(trip => {
      const div = document.createElement("div");
      div.className = "trip-item" + (trip.id === currentTripId ? " active" : "");
      div.dataset.id = trip.id;

      const left = document.createElement("div");
      left.style.flex = "1 1 auto";

      const name = document.createElement("div");
      name.className = "trip-name";
      name.textContent = trip.name || "Untitled trip";

      const meta = document.createElement("div");
      meta.className = "trip-meta";
      meta.textContent = `${trip.days.length} day(s)`;

      left.appendChild(name);
      left.appendChild(meta);

      const actions = document.createElement("div");
      actions.style.display = "flex";
      actions.style.gap = "6px";

      const openBtn = document.createElement("button");
      openBtn.textContent = "Open";
      openBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        currentTripId = trip.id;
        renderAll();
        saveSections();
      });

      const deleteBtn = document.createElement("button");
      deleteBtn.className = "danger";
      deleteBtn.textContent = "Delete";
      deleteBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        if (!confirm("Delete this trip?")) return;
        sections.trips = sections.trips.filter(t => t.id !== trip.id);
        if (currentTripId === trip.id) {
          currentTripId = sections.trips.length ? sections.trips[0].id : null;
        }
        renderAll();
        saveSections();
      });

      actions.appendChild(openBtn);
      actions.appendChild(deleteBtn);

      div.appendChild(left);
      div.appendChild(actions);

      div.addEventListener("click", () => {
        currentTripId = trip.id;
        renderAll();
        saveSections();
      });

      list.appendChild(div);
    });
  }

  function renderDays() {
    const container = document.getElementById("days-container");
    container.innerHTML = "";

    const trip = sections.trips.find(t => t.id === currentTripId);
    if (!trip) {
      document.getElementById("current-trip-title").textContent = "No trip selected";
      return;
    }

    document.getElementById("current-trip-title").textContent = trip.name || "Untitled trip";

    trip.days.forEach(day => {
      const block = document.createElement("div");
      block.className = "day-block";

      const title = document.createElement("div");
      title.className = "day-title";
      title.textContent = day.label || "Untitled day";

      const entriesDiv = document.createElement("div");
      entriesDiv.className = "entries";

      day.entries.forEach(entry => {
        const eDiv = document.createElement("div");
        eDiv.className = "entry";
        eDiv.dataset.id = entry.id;

        const eTitle = document.createElement("div");
        eTitle.className = "entry-title";
        eTitle.textContent = entry.title || "(Untitled)";

        const eMeta = document.createElement("div");
        eMeta.className = "entry-meta";
        const metaParts = [];
        if (entry.time) metaParts.push(entry.time);
        if (entry.category) metaParts.push(entry.category);
        if (entry.location) metaParts.push(entry.location);
        eMeta.textContent = metaParts.join(" · ");

        const actions = document.createElement("div");
        actions.className = "entry-actions";

        const mapsBtn = document.createElement("button");
        mapsBtn.textContent = "Open in Apple Maps";
        mapsBtn.addEventListener("click", () => {
          const q = encodeURIComponent(entry.location || entry.title || "");
          if (!q) return;
          window.open("https://maps.apple.com/?q=" + q, "_blank");
        });

        const editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.addEventListener("click", () => {
          openPanel(day.id, entry);
        });

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "danger";
        deleteBtn.textContent = "Delete";
        deleteBtn.addEventListener("click", () => {
          if (!confirm("Delete this stop?")) return;
          day.entries = day.entries.filter(e => e.id !== entry.id);
          renderDays();
          saveSections();
        });

        actions.appendChild(mapsBtn);
        actions.appendChild(editBtn);
        actions.appendChild(deleteBtn);

        eDiv.appendChild(eTitle);
        eDiv.appendChild(eMeta);
        if (entry.notes) {
          const notesDiv = document.createElement("div");
          notesDiv.className = "small";
          notesDiv.textContent = entry.notes;
          eDiv.appendChild(notesDiv);
        }
        eDiv.appendChild(actions);

        entriesDiv.appendChild(eDiv);
      });

      block.appendChild(title);
      block.appendChild(entriesDiv);
      container.appendChild(block);
    });
  }

  function renderDaySelect() {
    const select = document.getElementById("entry-day-select");
    select.innerHTML = "";

    const trip = sections.trips.find(t => t.id === currentTripId);
    if (!trip) return;

    trip.days.forEach(day => {
      const opt = document.createElement("option");
      opt.value = day.id;
      opt.textContent = day.label || "Untitled day";
      select.appendChild(opt);
    });
  }

  function renderAll() {
    renderTrips();
    renderDays();
    renderDaySelect();
  }

  function loadFromLocal() {
    try {
      const raw = localStorage.getItem(LOCAL_KEY);
      if (!raw) return false;
      const parsed = JSON.parse(raw);
      sections = parsed;
      if (!sections.trips.length) {
        sections = initialSections;
      }
      currentTripId = sections.trips[0].id;
      renderAll();
      document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
      return true;
    } catch (e) {
      console.error("Local load failed", e);
      return false;
    }
  }

  async function loadFromCloud() {
    if (!firestoreReady) return;
    try {
      const docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
      const snap = await docRef.get();
      if (snap.exists) {
        const data = snap.data();
        sections = data.sections || initialSections;
      } else {
        sections = initialSections;
        await docRef.set({ sections });
      }
      currentTripId = sections.trips[0].id;
      renderAll();
      localStorage.setItem(LOCAL_KEY, JSON.stringify(sections));
      document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
      setStatus(true, "Connected · Cloud sync");
    } catch (e) {
      console.error("Cloud load failed", e);
      setStatus(false, "Offline · Local only");
    }
  }

  async function saveSections() {
    saving = true;
    try {
      localStorage.setItem(LOCAL_KEY, JSON.stringify(sections));
      document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();

      if (firestoreReady) {
        const docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
        await docRef.set({ sections });
        setStatus(true, "Connected · Cloud sync");
      }
    } catch (e) {
      console.error("Save failed", e);
      setStatus(false, "Offline · Local only");
    } finally {
      saving = false;
    }
  }

  function subscribeCloud() {
    if (!firestoreReady) return;
    const docRef = db.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
    docRef.onSnapshot((snap) => {
      if (!snap.exists) return;
      if (saving) return;
      try {
        const data = snap.data();
        const incoming = data.sections;
        const localHash = JSON.stringify(sections);
        const incomingHash = JSON.stringify(incoming);
        if (incomingHash !== localHash) {
          sections = incoming;
          currentTripId = sections.trips[0].id;
          renderAll();
          localStorage.setItem(LOCAL_KEY, JSON.stringify(sections));
          document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
          setStatus(true, "Connected · Cloud sync");
        }
      } catch (e) {
        console.error("Snapshot error", e);
      }
    });
  }

  // Trip add
  document.getElementById("add-trip-btn").addEventListener("click", () => {
    const nameInput = document.getElementById("new-trip-name");
    const name = nameInput.value.trim() || "Untitled trip";
    nameInput.value = "";

    const trip = {
      id: uid(),
      name,
      days: [
        { id: uid(), label: "Day 1", entries: [] }
      ]
    };

    sections.trips.push(trip);
    currentTripId = trip.id;
    renderAll();
    saveSections();
  });

  // Panel open/close
  const panelBackdrop = document.getElementById("panel-backdrop");
  const openPanelBtn = document.getElementById("open-panel-btn");
  const closePanelBtn = document.getElementById("close-panel-btn");
  const saveEntryBtn = document.getElementById("save-entry-btn");

  let editingEntryId = null;
  let editingDayId = null;

  function openPanel(dayId, entry) {
    const trip = sections.trips.find(t => t.id === currentTripId);
    if (!trip) return;

    renderDaySelect();

    if (dayId) {
      document.getElementById("entry-day-select").value = dayId;
    }

    if (entry) {
      editingEntryId = entry.id;
      editingDayId = dayId;
      document.getElementById("entry-time").value = entry.time || "";
      document.getElementById("entry-title").value = entry.title || "";
      document.getElementById("entry-category").value = entry.category || "";
      document.getElementById("entry-location").value = entry.location || "";
      document.getElementById("entry-notes").value = entry.notes || "";
    } else {
      editingEntryId = null;
      editingDayId = null;
      document.getElementById("entry-time").value = "";
      document.getElementById("entry-title").value = "";
      document.getElementById("entry-category").value = "";
      document.getElementById("entry-location").value = "";
      document.getElementById("entry-notes").value = "";
    }

    panelBackdrop.classList.add("show");
  }

  function closePanel() {
    panelBackdrop.classList.remove("show");
  }

  openPanelBtn.addEventListener("click", () => {
    const trip = sections.trips.find(t => t.id === currentTripId);
    if (!trip) {
      alert("Select or create a trip first.");
      return;
    }
    openPanel(null, null);
  });

  closePanelBtn.addEventListener("click", closePanel);
  panelBackdrop.addEventListener("click", (e) => {
    if (e.target === panelBackdrop) closePanel();
  });

  saveEntryBtn.addEventListener("click", () => {
    const time = document.getElementById("entry-time").value.trim();
    const title = document.getElementById("entry-title").value.trim();
    const category = document.getElementById("entry-category").value.trim();
    const location = document.getElementById("entry-location").value.trim();
    const notes = document.getElementById("entry-notes").value.trim();
    const dayId = document.getElementById("entry-day-select").value;

    const trip = sections.trips.find(t => t.id === currentTripId);
    if (!trip) {
      alert("Select or create a trip first.");
      return;
    }
    const day = trip.days.find(d => d.id === dayId);
    if (!day) {
      alert("Select a valid day.");
      return;
    }

    if (editingEntryId) {
      const entry = day.entries.find(e => e.id === editingEntryId);
      if (entry) {
        entry.time = time;
        entry.title = title;
        entry.category = category;
        entry.location = location;
        entry.notes = notes;
      }
    } else {
      const entry = {
        id: uid(),
        time,
        title,
        category,
        location,
        notes
      };
      day.entries.push(entry);
    }

    editingEntryId = null;
    editingDayId = null;
    closePanel();
    renderDays();
    saveSections();
  });

  (async function init() {
    const hadLocal = loadFromLocal();
    if (!hadLocal && firestoreReady) {
      await loadFromCloud();
    } else if (!hadLocal) {
      sections = initialSections;
      currentTripId = sections.trips[0].id;
      renderAll();
      saveSections();
    }
    if (firestoreReady) {
      subscribeCloud();
    } else {
      renderAll();
    }
  })();
</script>
</body>
</html>
