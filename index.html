<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Trip Schedule Planner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        :root {
            --bg: #0f172a;
            --bg-alt: #020617;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.15);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #f97373;
            --border: #334155;
            --radius: 10px;
            --shadow: 0 18px 40px rgba(15, 23, 42, 0.7);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
                "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-shell {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px 16px 40px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 18px;
        }

        header h1 {
            font-size: 1.4rem;
            letter-spacing: 0.03em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        header h1 span.logo-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: var(--accent);
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.9);
        }

        header .status-pill {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(15, 23, 42, 0.9);
        }

        header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
        }

        main {
            display: grid;
            grid-template-columns: minmax(0, 260px) minmax(0, 1fr);
            gap: 18px;
        }

        @media (max-width: 800px) {
            main {
                grid-template-columns: minmax(0, 1fr);
            }
        }

        .card {
            background: linear-gradient(145deg, #020617 0, #0f172a 40%, #020617 100%);
            border-radius: var(--radius);
            border: 1px solid rgba(148, 163, 184, 0.18);
            box-shadow: var(--shadow);
            padding: 14px 14px 16px;
        }

        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .trip-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 420px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .trip-item {
            border-radius: 8px;
            padding: 8px 9px;
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.08s;
        }

        .trip-item:hover {
            background: rgba(15, 23, 42, 0.9);
            border-color: rgba(148, 163, 184, 0.4);
            transform: translateY(-1px);
        }

        .trip-item.active {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        .trip-name {
            font-size: 0.9rem;
        }

        .trip-meta {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .trip-actions {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 0.8rem;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            border: 1px solid rgba(148, 163, 184, 0.4);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: background 0.12s, border-color 0.12s, transform 0.08s;
        }

        button:hover {
            background: rgba(30, 64, 175, 0.7);
            border-color: var(--accent);
            transform: translateY(-0.5px);
        }

        button.primary {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        button.danger {
            background: rgba(127, 29, 29, 0.7);
            border-color: var(--danger);
        }

        button.icon-only {
            padding: 4px 7px;
            border-radius: 999px;
        }

        input,
        textarea {
            width: 100%;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.9);
            color: var(--text);
            padding: 7px 9px;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
            background: rgba(15, 23, 42, 1);
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        .field-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .field-row > div {
            flex: 1;
        }

        label {
            font-size: 0.75rem;
            color: var(--muted);
            display: block;
            margin-bottom: 3px;
        }

        .days-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 10px;
        }

        .day-pill {
            padding: 5px 9px;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            font-size: 0.8rem;
            cursor: pointer;
            background: rgba(15, 23, 42, 0.9);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .day-pill.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .day-pill span.dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: var(--accent);
        }

        .entries-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 360px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .entry-card {
            border-radius: 9px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            padding: 8px 9px;
            background: rgba(15, 23, 42, 0.95);
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 6px;
        }

        .entry-main {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .entry-title-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .entry-title {
            font-size: 0.9rem;
        }

        .entry-time {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .entry-meta {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .entry-notes {
            font-size: 0.8rem;
            color: #cbd5f5;
        }

        .entry-actions {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .section-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .sync-indicator span.dot {
            width: 7px;
            height: 7px;
            border-radius: 999px;
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.9);
        }

        .sync-indicator.off span.dot {
            background: #f97373;
            box-shadow: 0 0 10px rgba(249, 115, 115, 0.9);
        }

        .small {
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="app-shell">
    <header>
        <h1>
            <span class="logo-dot"></span>
            Trip Schedule Planner
        </h1>
        <div class="status-pill" id="status-pill">
            <span class="status-dot"></span>
            <span id="status-text">Connected · Live sync</span>
        </div>
    </header>

    <main>
        <!-- Left: Trips -->
        <section class="card">
            <div class="card-title">Trips</div>
            <div class="field-row" style="margin-bottom: 10px;">
                <div>
                    <label>New trip name</label>
                    <input id="new-trip-name" placeholder="e.g. Japan 2026" />
                </div>
                <div style="flex: 0 0 auto; align-self: flex-end;">
                    <button class="primary" id="add-trip-btn">Add trip</button>
                </div>
            </div>
            <div class="trip-list" id="trip-list"></div>
        </section>

        <!-- Right: Days + Entries -->
        <section class="card">
            <div class="card-title" id="current-trip-title">No trip selected</div>

            <div class="field-row" style="margin-bottom: 10px;">
                <div>
                    <label>Rename trip</label>
                    <input id="rename-trip-input" placeholder="Click a trip first" />
                </div>
                <div style="flex: 0 0 auto; align-self: flex-end;">
                    <button id="rename-trip-btn">Rename</button>
                </div>
            </div>

            <div class="days-strip" id="days-strip"></div>

            <div class="field-row" style="margin-bottom: 10px;">
                <div>
                    <label>New day label</label>
                    <input id="new-day-label" placeholder="Day 1 · Tokyo" />
                </div>
                <div style="flex: 0 0 auto; align-self: flex-end;">
                    <button class="primary" id="add-day-btn">Add day</button>
                </div>
            </div>

            <div class="entries-list" id="entries-list"></div>

            <div style="margin-top: 12px; border-top: 1px solid rgba(148,163,184,0.25); padding-top: 10px;">
                <div class="field-row">
                    <div>
                        <label>Time</label>
                        <input id="entry-time" placeholder="09:30" />
                    </div>
                    <div>
                        <label>Title</label>
                        <input id="entry-title" placeholder="Breakfast at Tsukiji" />
                    </div>
                </div>
                <div class="field-row">
                    <div>
                        <label>Category</label>
                        <input id="entry-category" placeholder="Food / Sightseeing / Transit" />
                    </div>
                    <div>
                        <label>Location</label>
                        <input id="entry-location" placeholder="Shinjuku, Tokyo" />
                    </div>
                </div>
                <div style="margin-bottom: 8px;">
                    <label>Notes</label>
                    <textarea id="entry-notes" placeholder="Reservation at 9:30, walk from hotel."></textarea>
                </div>
                <button class="primary" id="add-entry-btn">Add stop to current day</button>
            </div>

            <div class="section-footer">
                <div class="sync-indicator" id="sync-indicator">
                    <span class="dot"></span>
                    <span id="sync-text">Synced</span>
                </div>
                <div class="small" id="last-updated-text">Last updated: –</div>
            </div>
        </section>
    </main>
</div>

<script>
    // --- Shared storage key (same across all devices) ---
    const SHARED_KEY = "trip-planner-shared-v1";

    // --- State shape ---
    // sections = { trips: [ { id, name, days: [ { id, label, entries: [ { id, time, title, category, location, notes } ] } ] } ] }
    let sections = {
        trips: []
    };

    let currentTripId = null;
    let currentDayId = null;

    // --- Helpers ---
    function uid() {
        return Math.random().toString(36).slice(2) + Date.now().toString(36);
    }

    function nowText() {
        const d = new Date();
        return d.toLocaleString();
    }

    function getStorageBackend() {
        // Prefer window.storage (Edge shared storage / extension) if present
        if (window.storage && typeof window.storage.get === "function" && typeof window.storage.set === "function") {
            return {
                async get(key) {
                    const res = await window.storage.get(key, true);
                    return res && res.value ? res.value : null;
                },
                async set(key, value) {
                    await window.storage.set(key, value, true);
                }
            };
        }

        // Fallback to localStorage (sync via storage events)
        return {
            async get(key) {
                return localStorage.getItem(key);
            },
            async set(key, value) {
                localStorage.setItem(key, value);
            }
        };
    }

    const backend = getStorageBackend();

    // --- Rendering ---
    function renderTrips() {
        const list = document.getElementById("trip-list");
        list.innerHTML = "";

        sections.trips.forEach(trip => {
            const div = document.createElement("div");
            div.className = "trip-item" + (trip.id === currentTripId ? " active" : "");
            div.dataset.id = trip.id;

            const left = document.createElement("div");
            left.style.flex = "1 1 auto";

            const name = document.createElement("div");
            name.className = "trip-name";
            name.textContent = trip.name || "Untitled trip";

            const meta = document.createElement("div");
            meta.className = "trip-meta";
            meta.textContent = `${trip.days.length} day(s)`;

            left.appendChild(name);
            left.appendChild(meta);

            const actions = document.createElement("div");
            actions.className = "trip-actions";

            const selectBtn = document.createElement("button");
            selectBtn.className = "icon-only";
            selectBtn.textContent = "Open";
            selectBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                currentTripId = trip.id;
                if (!trip.days.length) {
                    // Ensure at least one day
                    const day = { id: uid(), label: "Day 1", entries: [] };
                    trip.days.push(day);
                }
                currentDayId = trip.days[0].id;
                renderAll();
                saveSections();
            });

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "icon-only danger";
            deleteBtn.textContent = "✕";
            deleteBtn.title = "Delete trip";
            deleteBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (!confirm("Delete this trip?")) return;
                sections.trips = sections.trips.filter(t => t.id !== trip.id);
                if (currentTripId === trip.id) {
                    currentTripId = null;
                    currentDayId = null;
                }
                renderAll();
                saveSections();
            });

            actions.appendChild(selectBtn);
            actions.appendChild(deleteBtn);

            div.appendChild(left);
            div.appendChild(actions);

            div.addEventListener("click", () => {
                currentTripId = trip.id;
                if (!trip.days.length) {
                    const day = { id: uid(), label: "Day 1", entries: [] };
                    trip.days.push(day);
                }
                currentDayId = trip.days[0].id;
                renderAll();
                saveSections();
            });

            list.appendChild(div);
        });
    }

    function renderDays() {
        const strip = document.getElementById("days-strip");
        strip.innerHTML = "";

        const trip = sections.trips.find(t => t.id === currentTripId);
        if (!trip) {
            document.getElementById("current-trip-title").textContent = "No trip selected";
            return;
        }

        document.getElementById("current-trip-title").textContent = trip.name || "Untitled trip";

        if (!trip.days.length) {
            const day = { id: uid(), label: "Day 1", entries: [] };
            trip.days.push(day);
            currentDayId = day.id;
        }

        if (!currentDayId) {
            currentDayId = trip.days[0].id;
        }

        trip.days.forEach(day => {
            const pill = document.createElement("div");
            pill.className = "day-pill" + (day.id === currentDayId ? " active" : "");
            pill.dataset.id = day.id;

            const dot = document.createElement("span");
            dot.className = "dot";

            const label = document.createElement("span");
            label.textContent = day.label || "Untitled day";

            pill.appendChild(dot);
            pill.appendChild(label);

            pill.addEventListener("click", () => {
                currentDayId = day.id;
                renderEntries();
            });

            strip.appendChild(pill);
        });
    }

    function renderEntries() {
        const list = document.getElementById("entries-list");
        list.innerHTML = "";

        const trip = sections.trips.find(t => t.id === currentTripId);
        if (!trip) return;

        const day = trip.days.find(d => d.id === currentDayId);
        if (!day) return;

        day.entries.forEach(entry => {
            const card = document.createElement("div");
            card.className = "entry-card";
            card.dataset.id = entry.id;

            const main = document.createElement("div");
            main.className = "entry-main";

            const titleRow = document.createElement("div");
            titleRow.className = "entry-title-row";

            const title = document.createElement("div");
            title.className = "entry-title";
            title.textContent = entry.title || "(Untitled)";

            const time = document.createElement("div");
            time.className = "entry-time";
            time.textContent = entry.time || "";

            titleRow.appendChild(title);
            titleRow.appendChild(time);

            const meta = document.createElement("div");
            meta.className = "entry-meta";
            meta.textContent = [entry.category, entry.location].filter(Boolean).join(" · ");

            const notes = document.createElement("div");
            notes.className = "entry-notes";
            notes.textContent = entry.notes || "";

            main.appendChild(titleRow);
            main.appendChild(meta);
            if (entry.notes) main.appendChild(notes);

            const actions = document.createElement("div");
            actions.className = "entry-actions";

            const editBtn = document.createElement("button");
            editBtn.className = "icon-only";
            editBtn.textContent = "Edit";
            editBtn.addEventListener("click", () => {
                document.getElementById("entry-time").value = entry.time || "";
                document.getElementById("entry-title").value = entry.title || "";
                document.getElementById("entry-category").value = entry.category || "";
                document.getElementById("entry-location").value = entry.location || "";
                document.getElementById("entry-notes").value = entry.notes || "";
                document.getElementById("add-entry-btn").dataset.editingId = entry.id;
            });

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "icon-only danger";
            deleteBtn.textContent = "✕";
            deleteBtn.addEventListener("click", () => {
                if (!confirm("Delete this stop?")) return;
                day.entries = day.entries.filter(e => e.id !== entry.id);
                renderEntries();
                saveSections();
            });

            actions.appendChild(editBtn);
            actions.appendChild(deleteBtn);

            card.appendChild(main);
            card.appendChild(actions);

            list.appendChild(card);
        });
    }

    function renderAll() {
        renderTrips();
        renderDays();
        renderEntries();
    }

    // --- Save & load with real-time-ish sync ---
    let lastIncomingHash = null;
    let lastLocalHash = null;
    let syncing = false;

    async function loadSections(initial = false) {
        try {
            const raw = await backend.get(SHARED_KEY);
            if (!raw) {
                if (initial) {
                    sections = { trips: [] };
                    currentTripId = null;
                    currentDayId = null;
                    renderAll();
                }
                return;
            }

            const parsed = JSON.parse(raw);
            const incomingHash = JSON.stringify(parsed);

            if (incomingHash !== lastIncomingHash) {
                sections = parsed;
                lastIncomingHash = incomingHash;
                lastLocalHash = incomingHash;
                renderAll();
                document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
                setSyncState(true, "Updated from shared");
            }
        } catch (e) {
            console.error("Failed to load shared data", e);
            setSyncState(false, "Load error");
        }
    }

    async function saveSections() {
        try {
            syncing = true;
            setSyncState(true, "Saving…");

            // Fetch latest shared version first to avoid overwriting
            const raw = await backend.get(SHARED_KEY);
            let latest = sections;

            if (raw) {
                try {
                    const parsed = JSON.parse(raw);
                    // Simple overwrite: we assume one active editor at a time.
                    // If you want conflict resolution, you’d merge here.
                    latest = parsed;
                } catch {
                    // ignore parse error, keep local
                }
            }

            // Overwrite with our local state (single-writer model)
            latest = sections;

            const payload = JSON.stringify(latest);
            await backend.set(SHARED_KEY, payload);

            lastIncomingHash = payload;
            lastLocalHash = payload;
            document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
            setSyncState(true, "Synced");
        } catch (e) {
            console.error("Failed to save shared data", e);
            setSyncState(false, "Save error");
        } finally {
            syncing = false;
        }
    }

    function setSyncState(ok, text) {
        const indicator = document.getElementById("sync-indicator");
        const syncText = document.getElementById("sync-text");
        const statusText = document.getElementById("status-text");
        const statusDot = document.querySelector(".status-dot");

        syncText.textContent = text || (ok ? "Synced" : "Offline");
        indicator.classList.toggle("off", !ok);

        statusText.textContent = ok ? "Connected · Live sync" : "Offline · Changes local only";
        statusDot.style.background = ok ? "#22c55e" : "#f97373";
        statusDot.style.boxShadow = ok
            ? "0 0 10px rgba(34, 197, 94, 0.9)"
            : "0 0 10px rgba(249, 115, 115, 0.9)";
    }

    // Polling loop for near real-time sync across devices
    setInterval(() => {
        if (syncing) return;
        loadSections(false);
    }, 2500); // every 2.5s

    // LocalStorage change events (same browser, different tabs)
    window.addEventListener("storage", (event) => {
        if (event.key !== SHARED_KEY) return;
        if (!event.newValue) return;
        try {
            const parsed = JSON.parse(event.newValue);
            const incomingHash = JSON.stringify(parsed);
            if (incomingHash !== lastIncomingHash) {
                sections = parsed;
                lastIncomingHash = incomingHash;
                renderAll();
                document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
                setSyncState(true, "Updated (storage event)");
            }
        } catch (e) {
            console.error("Failed to handle storage event", e);
        }
    });

    // Optional: BroadcastChannel for same-origin tabs (more instant)
    let bc = null;
    try {
        bc = new BroadcastChannel("trip-planner-channel");
        bc.onmessage = (ev) => {
            if (!ev.data || ev.data.type !== "update") return;
            const incomingHash = ev.data.payload;
            if (incomingHash !== lastIncomingHash) {
                sections = JSON.parse(incomingHash);
                lastIncomingHash = incomingHash;
                renderAll();
                document.getElementById("last-updated-text").textContent = "Last updated: " + nowText();
                setSyncState(true, "Updated (broadcast)");
            }
        };
    } catch {
        // ignore if not supported
    }

    function broadcastLocal() {
        if (!bc) return;
        try {
            const payload = JSON.stringify(sections);
            bc.postMessage({ type: "update", payload });
        } catch {
            // ignore
        }
    }

    // --- Event wiring ---
    document.getElementById("add-trip-btn").addEventListener("click", () => {
        const nameInput = document.getElementById("new-trip-name");
        const name = nameInput.value.trim() || "Untitled trip";
        nameInput.value = "";

        const trip = {
            id: uid(),
            name,
            days: [
                { id: uid(), label: "Day 1", entries: [] }
            ]
        };

        sections.trips.push(trip);
        currentTripId = trip.id;
        currentDayId = trip.days[0].id;
        renderAll();
        saveSections();
        broadcastLocal();
    });

    document.getElementById("rename-trip-btn").addEventListener("click", () => {
        if (!currentTripId) {
            alert("Select a trip first.");
            return;
        }
        const input = document.getElementById("rename-trip-input");
        const name = input.value.trim();
        if (!name) {
            alert("Enter a new name.");
            return;
        }
        const trip = sections.trips.find(t => t.id === currentTripId);
        if (!trip) return;
        trip.name = name;
        renderAll();
        saveSections();
        broadcastLocal();
    });

    document.getElementById("add-day-btn").addEventListener("click", () => {
        if (!currentTripId) {
            alert("Select a trip first.");
            return;
        }
        const labelInput = document.getElementById("new-day-label");
        const label = labelInput.value.trim() || "New day";
        labelInput.value = "";

        const trip = sections.trips.find(t => t.id === currentTripId);
        if (!trip) return;

        const day = { id: uid(), label, entries: [] };
        trip.days.push(day);
        currentDayId = day.id;
        renderAll();
        saveSections();
        broadcastLocal();
    });

    document.getElementById("add-entry-btn").addEventListener("click", () => {
        if (!currentTripId || !currentDayId) {
            alert("Select a trip and day first.");
            return;
        }

        const time = document.getElementById("entry-time").value.trim();
        const title = document.getElementById("entry-title").value.trim();
        const category = document.getElementById("entry-category").value.trim();
        const location = document.getElementById("entry-location").value.trim();
        const notes = document.getElementById("entry-notes").value.trim();

        const trip = sections.trips.find(t => t.id === currentTripId);
        if (!trip) return;
        const day = trip.days.find(d => d.id === currentDayId);
        if (!day) return;

        const editingId = document.getElementById("add-entry-btn").dataset.editingId;

        if (editingId) {
            const entry = day.entries.find(e => e.id === editingId);
            if (entry) {
                entry.time = time;
                entry.title = title;
                entry.category = category;
                entry.location = location;
                entry.notes = notes;
            }
            document.getElementById("add-entry-btn").dataset.editingId = "";
        } else {
            const entry = {
                id: uid(),
                time,
                title,
                category,
                location,
                notes
            };
            day.entries.push(entry);
        }

        document.getElementById("entry-time").value = "";
        document.getElementById("entry-title").value = "";
        document.getElementById("entry-category").value = "";
        document.getElementById("entry-location").value = "";
        document.getElementById("entry-notes").value = "";

        renderEntries();
        saveSections();
        broadcastLocal();
    });

    // --- Initial load ---
    (async function init() {
        await loadSections(true);
        setSyncState(true, "Synced");
    })();
</script>
</body>
</html>
